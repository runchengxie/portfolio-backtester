name: tests

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_LOCKED: "true"
  CSTREE_NO_PROJECT_TOOLS: "1"

defaults:
  run:
    working-directory: portfolio-backtester

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          path: portfolio-backtester
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.10.11"
          enable-cache: true
      - name: Install project dependencies
        run: uv sync --locked --extra dev
      - name: Run Ruff lint
        run: ./scripts/dev/run_tests.sh lint
      - name: Run Ruff format check
        run: ./scripts/dev/run_tests.sh format
      - name: Run ty typecheck
        run: ./scripts/dev/run_tests.sh typecheck
      - name: Run pytest
        run: ./scripts/dev/run_tests.sh all
      # - name: Run BasedPyright advisory
      #   continue-on-error: true
      #   run: ./scripts/dev/run_tests.sh basedpyright
      - name: Run maintainability ratchet
        run: ./scripts/dev/run_tests.sh maintainability
