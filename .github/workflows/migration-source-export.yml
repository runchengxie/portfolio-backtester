name: migration source export

on:
  push:
    branches: [refactor/research-app-ownership]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - run: tar --exclude=.git --exclude=.venv --exclude=artifacts -czf /tmp/portfolio-backtester-current.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: portfolio-backtester-current
          path: /tmp/portfolio-backtester-current.tar.gz
          if-no-files-found: error
