name: owner-native namespace migration

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'refactor/owner-native-namespace'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ github.token }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Apply namespace migration
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import ast
          import subprocess
          from pathlib import Path

          ROOT = Path.cwd()
          OLD = ROOT / 'src/cstree/backtesting'
          NEW = ROOT / 'src/portfolio_backtester'

          if OLD.exists():
              subprocess.run(['git', 'mv', str(OLD.relative_to(ROOT)), str(NEW.relative_to(ROOT))], check=True)
              subprocess.run(['git', 'rm', 'src/cstree/__init__.py'], check=True)
              (ROOT / 'src/cstree').rmdir()

          text_suffixes = {'.py', '.pyi', '.md', '.toml', '.yml', '.yaml', '.sh', '.txt'}
          replacements = (
              ('src/cstree/backtesting', 'src/portfolio_backtester'),
              ('cstree.backtesting', 'portfolio_backtester'),
              ('cstree.alpha', 'alpha_research'),
              ('cstree.pipeline', 'strategy_pipeline.pipeline'),
              ('cstree.contracts', 'strategy_pipeline.contracts'),
          )
          for raw in subprocess.check_output(['git', 'ls-files', '-z']).decode().split('\0'):
              if not raw:
                  continue
              path = ROOT / raw
              if not path.exists() or path.suffix.lower() not in text_suffixes:
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              updated = text
              for old, new in replacements:
                  updated = updated.replace(old, new)
              if updated != text:
                  path.write_text(updated, encoding='utf-8')

          pyproject = ROOT / 'pyproject.toml'
          text = pyproject.read_text(encoding='utf-8')
          text = text.replace('version = "0.1.0"', 'version = "0.2.0"', 1)
          text = text.replace(
              'include = ["cstree", "portfolio_backtester*"]',
              'include = ["portfolio_backtester", "portfolio_backtester.*"]',
          )
          text = text.replace('  "src/cstree/__init__.py",\n', '')
          if '[tool.ruff.lint.isort]' in text and 'known-first-party' not in text:
              text = text.replace(
                  '[tool.ruff.lint.isort]\ncombine-as-imports = true',
                  '[tool.ruff.lint.isort]\ncombine-as-imports = true\nknown-first-party = ["portfolio_backtester"]',
              )
          pyproject.write_text(text, encoding='utf-8')

          readme = ROOT / 'README.md'
          readme_text = readme.read_text(encoding='utf-8')
          marker = '## Python namespace\n'
          section = '''\n## Python namespace\n\nThe canonical Python package is now `portfolio_backtester`. New code must not\nadd `cstree.backtesting` imports. The legacy namespace is provided only by the\ncoordinated `strategy-pipeline` compatibility facade during the 0.2/1.x\ntransition and is scheduled for removal with the workspace 2.0 release.\n\n```python\nfrom portfolio_backtester.api import run_backtest\n```\n'''
          if marker not in readme_text:
              readme.write_text(readme_text.rstrip() + '\n' + section, encoding='utf-8')

          docs = ROOT / 'docs/namespace-migration.md'
          docs.write_text('''# Portfolio namespace migration\n\n`portfolio_backtester` is the sole implementation namespace owned by this distribution.\n\n- Canonical import: `portfolio_backtester.*`\n- Deprecated import: `cstree.backtesting.*`\n- Compatibility owner: `strategy-pipeline`\n- Compatibility window: portfolio-backtester 0.2 and workspace 1.x\n- Removal target: workspace 2.0\n\nThis repository no longer installs `cstree`, no longer uses `pkgutil.extend_path`,\nand must remain independently importable. Framework adapters may consume owner APIs,\nbut third-party runtime types cannot enter public artifacts or contracts.\n''', encoding='utf-8')

          test = ROOT / 'tests/test_namespace_migration.py'
          test.write_text('''from __future__ import annotations\n\nimport ast\nfrom pathlib import Path\n\nROOT = Path(__file__).resolve().parents[1]\nSRC = ROOT / "src"\n\n\ndef test_owner_native_package_is_the_only_source_package() -> None:\n    assert (SRC / "portfolio_backtester" / "__init__.py").is_file()\n    assert not (SRC / "cstree").exists()\n\n\ndef test_legacy_namespace_cannot_regrow() -> None:\n    offenders: list[str] = []\n    for path in (SRC / "portfolio_backtester").rglob("*.py"):\n        text = path.read_text(encoding="utf-8")\n        if "cstree.backtesting" in text or "pkgutil import extend_path" in text:\n            offenders.append(str(path.relative_to(ROOT)))\n    assert offenders == []\n\n\ndef test_no_parent_relative_imports_escape_owner_package() -> None:\n    offenders: list[str] = []\n    for path in (SRC / "portfolio_backtester").rglob("*.py"):\n        tree = ast.parse(path.read_text(encoding="utf-8"), filename=str(path))\n        for node in ast.walk(tree):\n            if isinstance(node, ast.ImportFrom) and node.level > 1:\n                offenders.append(f"{path.relative_to(ROOT)}:{node.lineno}")\n    assert offenders == []\n\n\ndef test_backtester_does_not_depend_on_application_or_alpha_owners() -> None:\n    forbidden = ("strategy_pipeline", "alpha_research")\n    offenders: list[str] = []\n    for path in (SRC / "portfolio_backtester").rglob("*.py"):\n        text = path.read_text(encoding="utf-8")\n        if any(name in text for name in forbidden):\n            offenders.append(str(path.relative_to(ROOT)))\n    assert offenders == []\n''', encoding='utf-8')

          subprocess.run(['python', '-m', 'compileall', '-q', 'src'], check=True)

          forbidden = []
          for path in NEW.rglob('*.py'):
              text = path.read_text(encoding='utf-8')
              if 'cstree.backtesting' in text or 'pkgutil import extend_path' in text:
                  forbidden.append(str(path.relative_to(ROOT)))
              tree = ast.parse(text, filename=str(path))
              for node in ast.walk(tree):
                  if isinstance(node, ast.ImportFrom) and node.level > 1:
                      forbidden.append(f'{path.relative_to(ROOT)}:{node.lineno}:parent-relative')
          if forbidden:
              raise SystemExit('namespace migration blockers:\n' + '\n'.join(sorted(set(forbidden))))
          PY
          git rm .github/workflows/owner-native-namespace-migration.yml
          git diff --check
      - name: Commit migrated namespace
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor(namespace): move backtesting APIs to portfolio_backtester'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
