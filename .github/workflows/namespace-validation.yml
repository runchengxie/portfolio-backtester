name: namespace validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    if: github.head_ref == 'refactor/owner-native-namespace'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ github.token }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check pytest
      - name: Validate owner-native namespace
        run: |
          python -m compileall -q src
          python scripts/dev/namespace_boundary.py
          python -m pytest -q tests/test_namespace_migration.py
          git rm .github/workflows/namespace-validation.yml
      - name: Record validation cleanup
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'chore(namespace): record portfolio validation' .github/workflows/namespace-validation.yml
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
