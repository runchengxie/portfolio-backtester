name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Sync development environment
        run: uv sync --locked --extra dev
      - name: Lint
        id: lint
        continue-on-error: true
        run: scripts/dev/run_tests.sh lint
      - name: Format check
        id: format
        continue-on-error: true
        run: scripts/dev/run_tests.sh format
      - name: Generate Ruff format patch
        if: steps.format.outcome == 'failure'
        run: |
          uv run --extra dev ruff format .
          git diff --binary > ruff-format.patch
      - name: Upload Ruff format patch
        if: steps.format.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ruff-format-patch
          path: ruff-format.patch
      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: scripts/dev/run_tests.sh typecheck
      - name: Tests
        id: tests
        continue-on-error: true
        run: scripts/dev/run_tests.sh all
      - name: Quality gate
        if: always()
        env:
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          FORMAT_OUTCOME: ${{ steps.format.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
        run: |
          printf 'lint=%s\nformat=%s\ntypecheck=%s\ntests=%s\n' \
            "$LINT_OUTCOME" "$FORMAT_OUTCOME" "$TYPECHECK_OUTCOME" "$TESTS_OUTCOME"
          test "$LINT_OUTCOME" = success
          test "$FORMAT_OUTCOME" = success
          test "$TYPECHECK_OUTCOME" = success
          test "$TESTS_OUTCOME" = success
