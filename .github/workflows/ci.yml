name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Sync development environment
        run: uv sync --locked --extra dev
      - name: Lint
        run: scripts/dev/run_tests.sh lint
      - name: Format check
        run: scripts/dev/run_tests.sh format
      - name: Typecheck
        run: scripts/dev/run_tests.sh typecheck
      - name: Tests
        id: tests
        run: |
          set -o pipefail
          scripts/dev/run_tests.sh all 2>&1 | tee pytest.log
      - name: Upload pytest failure log
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pytest-failure-log
          path: pytest.log
